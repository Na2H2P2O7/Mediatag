name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Build app
        run: |
          pyinstaller --noconfirm --windowed --name "Mediatag" \
            --icon "assets/icon.icns" \
            --add-data "src/mediatag/gui:mediatag/gui" \
            --paths "src" \
            --hidden-import mediatag.gui_app \
            --hidden-import mediatag.pipeline \
            --hidden-import mediatag.tmdb \
            --hidden-import mediatag.media \
            --hidden-import mutagen.mp4 \
            --hidden-import PIL.Image \
            mediatag_app.py

      - name: Package DMG
        run: |
          cd dist
          mkdir dmg_folder
          mv "Mediatag.app" dmg_folder/
          ln -s /Applications dmg_folder/Applications
          hdiutil create -volname "Mediatag" -srcfolder dmg_folder -ov -format UDZO Mediatag-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mediatag-macOS
          path: dist/Mediatag-macOS.dmg
