name: Build Apps

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build app
        run: python -m PyInstaller --noconfirm Mediatag.spec

      - name: Package zip
        run: ditto -c -k --sequesterRsrc --keepParent dist/Mediatag.app dist/Mediatag-macOS.zip

      - name: Package dmg
        run: hdiutil create -volname "Mediatag" -srcfolder dist/Mediatag.app -ov -format UDZO dist/Mediatag-macOS.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mediatag-macOS
          path: |
            dist/Mediatag-macOS.zip
            dist/Mediatag-macOS.dmg

  build-windows:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build app
        run: python -m PyInstaller --noconfirm --clean Mediatag-Windows.spec

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path dist\Mediatag-Windows -DestinationPath dist\Mediatag-Windows.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mediatag-Windows
          path: dist/Mediatag-Windows.zip
